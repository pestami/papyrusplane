<!DOCTYPE html>
<html>
<!--------------------------------------------------------------------------------------->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WLAN-RELAY</title>
    <style>
        table { border-collapse: collapse; }
        th, td {
          border: 1px solid #ccc;
          padding: 8px;
          min-width: 90px;
        }
        td[contenteditable="true"] { background: #fafafa; }
      </style>

    <style>
      #sendBtn{
        appearance: none;
        border: 0;
        padding: 12px 18px;
        border-radius: 12px;
        background: linear-gradient(135deg, #4f46e5 0%, #06b6d4 100%);
        color: #fff;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 10px 20px rgba(79, 70, 229, 0.25);
        transition: transform .08s ease, box-shadow .15s ease, filter .15s ease;
      }
      #sendBtn:hover{
        filter: brightness(1.05);
        box-shadow: 0 14px 28px rgba(79, 70, 229, 0.28);
      }
      #sendBtn:active{
        transform: translateY(1px);
        box-shadow: 0 8px 16px rgba(79, 70, 229, 0.22);
      }
      #sendBtn:focus{
        outline: 3px solid rgba(79, 70, 229, 0.35);
        outline-offset: 2px;
      }
    </style>



    </head>

    <body>
      <!--------------------------------------------------------------------------------------->
      <h1>WLAN - CONTROLLER Cockpit</h1>

      <table id="isdTable">
        <thead>
          <tr>
            <th id="h_L_duty">L_duty</th>
            <th id="h_L_enabled">L_enabled</th>
            <th id="h_L_direction">L_direction</th>
            <th id="h_R_duty">R_duty</th>
            <th id="h_R_direction">R_direction</th>
            <th id="h_R_enabled">R_enabled</th>
            <th id="h_S_angle">S_angle</th>
          </tr>
        </thead>

        <tbody>
          <tr>
            <td id="L_duty" contenteditable="true">0</td>
            <td id="L_enabled" contenteditable="true">0</td>
            <td id="L_direction" contenteditable="true">0</td>
            <td id="R_duty" contenteditable="true">0</td>
            <td id="R_direction" contenteditable="true">0</td>
            <td id="R_enabled" contenteditable="true">0</td>
            <td id="S_angle" contenteditable="true">0</td>
          </tr>
          <tr>
            <td colspan="7" id="jasonstring" ></td>
          </tr>
          
        </tbody>
      </table>
      <BR>
      <!-- Add this button anywhere you want in the body -->
    <button id="sendBtn" type="button">----------------Send---------------------</button>
      <!--------------------------------------------------------------------------------------->
    <body>

    <!--------------------------------------------------------------------------------
    =================================================================================
    COCKPIT
    =================================================================================
    -------------->

    <!--------------------------------------------------------------------------------------->
    <script>
      //==============================================================
        function sendRequestFull() 
              {
                  value1=document.getElementById("L_duty").innerHTML;
                  value2=document.getElementById("L_enabled").innerHTML;
                  value3=document.getElementById("L_direction").innerHTML;
                  value4=document.getElementById("R_duty").innerHTML;
                  value5=document.getElementById("R_enabled").innerHTML;
                  value6=document.getElementById("R_direction").innerHTML;
                  value7=document.getElementById("S_angle").innerHTML;
                  
          
          jasonstring1="L_duty: " + value1 +  ";" + "L_enabled: " + value2 + " ; " + "L_direction: " + value3 + " ; " ;
          jasonstring2="R_duty: " + value4 +  ";" + "R_enabled: " + value5 + " ; " + "R_direction: " + value6 + " ; " ;
        jasonstring=jasonstring1 +jasonstring2 +  "S_angle:" + value7
          document.getElementById("jasonstring").innerHTML= jasonstring;


                                     
          //body: JSON.stringify({ "MOTORL_PWM": value1, "MOTORL_ENABLE": value2, "MOTORL_DIRECTION": value3, "MOTORR_PWM": value4, "MOTORR_ENABLE": value5, "MOTORR_DIRECTION": value6, "SERVO_A": value7 })
  
                  fetch('/api/pins', {
                      method: 'POST',
                      headers: {
                          'Content-Type': 'application/json'
                      },
                       body: JSON.stringify({ "MOTORL_PWM": value1, "MOTORL_ENABLE": value2, "MOTORL_DIRECTION": value3, "MOTORR_PWM": value4, "MOTORR_ENABLE": value5, "MOTORR_DIRECTION": value6, "SERVO_A": value7 })
                  })
                  .then(response => response.text())
                  .then(data => console.log(data))
                  .catch(error => console.error('Error:', error));
          }
     
      </script>
        <script>
        const zeroIds = ["L_duty", "L_enabled", "L_direction", "R_duty", "R_direction", "R_enabled"];
        zeroIds.forEach(id => {
          document.getElementById(id).textContent = "0";
        });

        document.getElementById("S_angle").textContent = "90";
      </script>

      <script>
      // Button click -> call your function
      document.getElementById("sendBtn").addEventListener("click", () => {
        sendRequestFull();
      });
    </script>

    <!--------------------------------------------------------------------------------------->
    <!--------------------------------------------------------------------------------------->
    </body>
    </html>
